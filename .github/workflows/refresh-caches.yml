name: Refresh caches

on:
  schedule:
    - cron: "0 8 * * 4"
    - cron: "0 8 * * 5"
    - cron: "0 8 * * 6"
    - cron: "0 8 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      OC_USERNAME: ${{ secrets.OC_USERNAME }}
      OC_PASSWORD: ${{ secrets.OC_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install requests flask

      # Determine which shard to run
      - name: Pick shard from schedule
        run: |
          case "${{ github.event.schedule }}" in
            "0 8 * * 4") echo "SHARD=hspolicy25" >> $GITHUB_ENV ;;
            "0 8 * * 5") echo "SHARD=ndtceda25" >> $GITHUB_ENV ;;
            "0 8 * * 6") echo "SHARD=hsld25" >> $GITHUB_ENV ;;
            "0 8 * * 0") echo "SHARD=hspf25" >> $GITHUB_ENV ;;
          esac

      # Default shard if manually triggered
      - name: Default shard for manual run
        if: github.event.schedule == ''
        run: echo "SHARD=hspolicy25" >> $GITHUB_ENV

      - name: Rebuild selected shard
        run: python app.py --rebuild --shard "$SHARD"

      - name: Commit and push if changed
        run: |
          if git status --porcelain -- caches | grep . >/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add caches
            git commit -m "chore: refresh caches"
            git push
          else
            echo "No cache changes to commit."
          fi
